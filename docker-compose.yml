version: '3.8'

services:
  wordpress:
    image: wordpress:latest
    container_name: ifixapple
    ports:
      - "8081:80"  # Maps port 8080 on your host to port 80 in the WordPress container
    environment:
      WORDPRESS_DB_HOST: mysql:3306  # Points to the mysql service
      WORDPRESS_DB_NAME: ifixapple  # Name of the WordPress database
      WORDPRESS_DB_USER: root  # Database user (root)
      WORDPRESS_DB_PASSWORD: adewale  # Database password
    volumes:
      - ifixapple_data:/var/www/html  # Persists WordPress data across restarts
    depends_on:
      - mysql  # Ensures MySQL starts before WordPress

  mysql:
    image: mysql:5.7
    container_name: ifixapple-mysql
    environment:
      MYSQL_ROOT_PASSWORD: adewale  # Root password for MySQL
      MYSQL_DATABASE: ifixapple  # Creates the WordPress database
      MYSQL_USER: admin  # User for WordPress to connect
      MYSQL_PASSWORD: adewale  # Password for the WordPress user
    volumes:
      - ifixapple_mysql_data:/var/lib/mysql  # Persists MySQL data

volumes:
  ifixapple_data:
  ifixapple_mysql_data:
